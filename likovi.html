<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Impact - Regije i Likovi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #8fb3e3; 
            color: #333;
        }
        header {
           
            background: linear-gradient(135deg, #ffd1dc, #ffb6c1);
            color: #3d3d3d;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        nav {
            background-color: #ffd1dc;
            text-align: center;
            padding: 10px;
            position: sticky;
            top: 0;
        }
        nav a {
            color: #3d3d3d;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 10px;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s;
        }
        nav a:hover, nav a.active {
            background-color: #ffb6c1;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .section {
            background: white;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ffb6c1; 
            padding-bottom: 5px;
            margin-top: 0;
        }
        .region-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
            display: block;
            border: 2px solid #ffb6c1;
        }
        .archon-info {
            background-color: #ecf0f1;
            padding: 10px 15px;
            border-left: 5px solid #ffb6c1;
            margin-bottom: 15px;
            font-weight: 500;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #e5989b;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .element-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            color: white;
            font-weight: bold;
        }
        .anemo { background-color: #72e2c4; color: #111; }
        .geo { background-color: #de9b3a; }
        .electro { background-color: #a757e6; }
        .dendro { background-color: #a3da42; color: #111; }
        .hydro { background-color: #2299ff; }
        .pyro { background-color: #ef7961; }
        .cryo { background-color: #a0e6ef; color: #111; }
